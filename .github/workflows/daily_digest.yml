name: Daily Traffic Digest

on:
  schedule:
    # 07:00 UTC = 09:00 Israel winter time (UTC+2)
    # אחרי שינוי שעון (סוף מרץ): 07:00 UTC = 10:00 Israel summer time
    # לשינוי לשעון קיץ: שנה ל-'0 6 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Send digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_digest.py
